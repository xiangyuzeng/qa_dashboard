name: Weekday data refresh

# Re-runs the prep pipeline on weekdays (Mon–Fri) and pushes refreshed data straight to main,
# triggering Vercel's automatic redeploy. All sources are public APIs — no manual review needed.
# Manual dispatch defaults to the same behaviour; set push_to_main: false to open a review PR instead.
#
# Collector API keys come from repo Secrets (Settings → Secrets and variables → Actions). Any
# unset key leaves that collector dormant (0 rows + a truthful provenance stub) — never fabricated.

on:
  schedule:
    - cron: "0 6 * * 1-5" # 06:00 UTC, Monday–Friday
  workflow_dispatch:
    inputs:
      push_to_main:
        description: "Commit straight to main (skips the review PR; triggers deploy)"
        type: boolean
        default: true

concurrency:
  group: weekday-refresh
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install openpyxl python-docx

      - name: Refresh data (collect → enrich → domains → translate → meta → validate → export)
        env:
          HTTP_USER_AGENT: "LuckinNA-QA-FoodSafety-Monitor/1.0 (+github-actions)"
          FSIS_USER_AGENT: "LuckinNA-QA-FoodSafety-Monitor/1.0 (+github-actions)"
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
          FDA_OII_USER: ${{ secrets.FDA_OII_USER }}
          FDA_OII_KEY: ${{ secrets.FDA_OII_KEY }}
          LEGISCAN_KEY: ${{ secrets.LEGISCAN_KEY }}
          NY_SENATE_KEY: ${{ secrets.NY_SENATE_KEY }}
          OPENSTATES_KEY: ${{ secrets.OPENSTATES_KEY }}
          DOL_ENFORCE_KEY: ${{ secrets.DOL_ENFORCE_KEY }}
          DEEPL_KEY: ${{ secrets.DEEPL_KEY }}
        run: |
          npm run prep:collect
          npm run prep:enrich
          npm run prep:domains
          npm run prep:translate
          npm run prep:meta
          npm run prep:validate
          npm run prep:export

      - name: Type-check + build (proves the refreshed data renders)
        run: |
          npm run typecheck
          npm run build

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain data public/exports)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes this run."
          fi

      # Default (scheduled runs + manual dispatch): commit straight to main → Vercel redeploys.
      # NB: on `schedule` events `inputs.push_to_main` is null, and `null != false` is *false* in
      # GitHub expressions — which silently sent every scheduled run down the review-PR path and
      # froze main. Only divert to a PR when a dispatch *explicitly* set push_to_main=false.
      - name: Commit to main
        if: steps.diff.outputs.changed == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.push_to_main == false)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data public/exports
          git commit -m "chore(data): weekday refresh [skip ci]"
          git push

      # Opt-in: open a review PR instead (manual dispatch with push_to_main: false).
      - name: Open review PR
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'workflow_dispatch' && inputs.push_to_main == false
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data-refresh
          base: main
          add-paths: |
            data
            public/exports
          commit-message: "chore(data): manual refresh for review"
          title: "Data refresh — review before deploy"
          body: |
            Manual prep refresh (collect → enrich → domains → meta → validate → export).

            `prep:validate` + `npm run build` already passed in CI.
            Merging this PR deploys via Vercel.
          delete-branch: true
